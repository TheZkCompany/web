<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>The ZK Company.</title>
        <meta
            name="description"
            content="The ZK Company — proving systems for a private, verifiable web. Research, executed in the open: zero-knowledge proofs, zkML, and recursion."
        />
        <meta name="theme-color" content="#16171B" />
        <link rel="icon" type="image/svg+xml" href="zk-favicon.svg" />

        <meta property="og:type" content="website" />
        <meta property="og:title" content="The ZK Company" />
        <meta
            property="og:description"
            content="Proving systems for a private, verifiable web. Prove anything. Reveal nothing."
        />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="The ZK Company" />
        <meta
            name="twitter:description"
            content="Proving systems for a private, verifiable web. Prove anything. Reveal nothing."
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&display=swap"
            rel="stylesheet"
        />

        <style>
            :root {
                --ink: #16171b;
                --graphite: #565853;
                --steel: #8b8d8a;
                --ash: #b9b8b3;
                --mist: #d8d7d2;
                --paper: #f4f3ef;

                --sans: "Space Grotesk", system-ui, sans-serif;
                --serif: "Spectral", Georgia, serif;
                --mono: "JetBrains Mono", ui-monospace, monospace;
            }

            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
            }

            body {
                min-height: 100vh;
                min-height: 100dvh;
                background: var(--ink);
                color: var(--paper);
                font-family: var(--sans);
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }

            main {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 6vmin;
                /* clear space of one "arrow length" around the composition */
                gap: clamp(18px, 3.4vmin, 30px);
            }

            .mark {
                width: clamp(68px, 12vmin, 104px);
                height: auto;
                overflow: visible;
            }
            .mark * {
                fill: none;
                stroke: var(--paper);
                stroke-width: 5;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            .mark .core {
                fill: var(--paper);
                stroke: none;
            }

            .wordmark {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: clamp(4px, 1vmin, 8px);
            }

            .eyebrow {
                font-family: var(--mono);
                font-size: clamp(10px, 1.5vmin, 12px);
                font-weight: 500;
                letter-spacing: 0.42em;
                text-indent: 0.42em;
                color: var(--steel);
                text-transform: uppercase;
            }

            h1 {
                font-family: var(--sans);
                font-weight: 600;
                font-size: clamp(1.6rem, 5.6vw, 2.7rem);
                line-height: 1.02;
                letter-spacing: -0.02em;
                color: var(--paper);
            }

            .sub {
                font-family: var(--sans);
                font-weight: 500;
                font-size: clamp(1rem, 3.2vw, 1.75rem);
                line-height: 1.1;
                letter-spacing: -0.01em;
                color: var(--steel);
            }

            .rule {
                width: clamp(40px, 8vmin, 64px);
                height: 1px;
                background: var(--graphite);
                border: 0;
            }

            .lede {
                font-family: var(--serif);
                font-weight: 400;
                font-style: italic;
                font-size: clamp(1rem, 2.6vw, 1.0625rem);
                line-height: 1.5;
                color: var(--ash);
                max-width: 30ch;
            }

            .tags {
                font-family: var(--mono);
                font-size: clamp(10px, 1.5vmin, 12px);
                font-weight: 500;
                letter-spacing: 0.28em;
                text-indent: 0.28em;
                color: var(--steel);
                margin-top: clamp(4px, 1.4vmin, 12px);
            }
            .tags .dot {
                color: var(--graphite);
                padding: 0 0.15em;
            }

            .gh {
                display: inline-flex;
                align-items: center;
                gap: 0.45em;
                font-family: var(--mono);
                font-size: clamp(11px, 1.6vmin, 13px);
                font-weight: 500;
                letter-spacing: 0.04em;
                color: var(--steel);
                text-decoration: none;
                transition: color 0.25s ease;
            }
            .gh .arrow {
                transition: transform 0.25s ease;
            }
            .gh:hover,
            .gh:focus-visible {
                color: var(--paper);
            }
            .gh:hover .arrow,
            .gh:focus-visible .arrow {
                transform: translate(2px, -2px);
            }
            .gh:focus-visible {
                outline: 2px solid var(--steel);
                outline-offset: 3px;
            }

            /* ---------- entrance choreography: the proof radiates in ---------- */
            @keyframes draw {
                to {
                    stroke-dashoffset: 0;
                }
            }
            @keyframes fadeIn {
                to {
                    opacity: 1;
                }
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            .mark .diamond {
                stroke-dasharray: 216;
                stroke-dashoffset: 216;
                animation: draw 1s cubic-bezier(0.65, 0, 0.35, 1) 0.15s forwards;
            }
            .mark .vec {
                stroke-dasharray: 30;
                stroke-dashoffset: 30;
                animation: draw 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
            }
            .mark .vec:nth-of-type(1) {
                animation-delay: 1.05s;
            }
            .mark .vec:nth-of-type(2) {
                animation-delay: 1.17s;
            }
            .mark .vec:nth-of-type(3) {
                animation-delay: 1.29s;
            }
            .mark .vec:nth-of-type(4) {
                animation-delay: 1.41s;
            }
            .mark .head,
            .mark .core {
                opacity: 0;
                animation: fadeIn 0.45s ease forwards;
            }
            .mark .core {
                animation-delay: 1.5s;
            }
            .mark .head:nth-of-type(1) {
                animation-delay: 1.4s;
            }
            .mark .head:nth-of-type(2) {
                animation-delay: 1.52s;
            }
            .mark .head:nth-of-type(3) {
                animation-delay: 1.64s;
            }
            .mark .head:nth-of-type(4) {
                animation-delay: 1.76s;
            }

            .reveal {
                opacity: 0;
                animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            }
            .eyebrow.reveal {
                animation-delay: 1.55s;
            }
            h1.reveal {
                animation-delay: 1.68s;
            }
            .sub.reveal {
                animation-delay: 1.8s;
            }
            .rule.reveal {
                animation-delay: 1.92s;
            }
            .lede.reveal {
                animation-delay: 2s;
            }
            .tags.reveal {
                animation-delay: 2.14s;
            }
            .gh.reveal {
                animation-delay: 2.28s;
            }

            @media (prefers-reduced-motion: reduce) {
                .mark .diamond,
                .mark .vec {
                    stroke-dashoffset: 0;
                    animation: none;
                }
                .mark .head,
                .mark .core,
                .reveal {
                    opacity: 1;
                    transform: none;
                    animation: none;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <svg
                class="mark"
                viewBox="0 0 100 100"
                role="img"
                aria-label="The ZK Company mark"
            >
                <polygon class="diamond" points="50,12 88,50 50,88 12,50" />
                <line class="vec" x1="50" y1="50" x2="50" y2="24" />
                <polyline class="head" points="43,31 50,23 57,31" />
                <line class="vec" x1="50" y1="50" x2="76" y2="50" />
                <polyline class="head" points="69,43 77,50 69,57" />
                <line class="vec" x1="50" y1="50" x2="50" y2="76" />
                <polyline class="head" points="43,69 50,77 57,69" />
                <line class="vec" x1="50" y1="50" x2="24" y2="50" />
                <polyline class="head" points="31,43 23,50 31,57" />
                <circle class="core" cx="50" cy="50" r="4" />
            </svg>

            <div class="wordmark">
                <p class="eyebrow reveal">The</p>
                <h1 class="reveal">ZK Company</h1>
                <p class="sub reveal">Research &amp; execution</p>
            </div>

            <hr class="rule reveal" />

            <p class="lede reveal">
                Proving systems for a private and verifiable AI.
            </p>

            <p class="tags reveal">
                ZK-STARKS<span class="dot">·</span>ZK-ML<span class="dot"
                    >·</span
                >AI
            </p>

            <a
                class="gh reveal"
                href="https://github.com/TheZkCompany"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="The ZK Company on GitHub"
            >
                Github<span class="arrow" aria-hidden="true">↗</span>
            </a>
        </main>
    </body>
</html>
